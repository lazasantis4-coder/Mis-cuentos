<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <!-- NUEVA L�NEA PARA PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#A3B18A">
    <title>Petite Histoires</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <!-- Encabezado -->
        <div class="app-header">
            <img src="https://i.ibb.co/5CPkknS/file-00000000d7d8720c96055738a088c8f9.png" alt="Petite Histoires" style="width: 100%; max-width: 500px; border-radius: 20px; margin-bottom: 10px;">
            <h1>Petite Histoires</h1>
            
            <!-- NUEVO BOT�N DE INSTALACI�N -->
            <button id="btnInstalar" style="display:none; padding: 15px 30px; background-color: #A3B18A; color: white; border: none; border-radius: 25px; font-size: 16px; cursor: pointer; margin: 20px auto; display: block;">
                Instalar App de Cuentos 
            </button>
        </div>

        <!-- Anuncio -->
        <div class="adsense-slot">Annonce Initiale (Adsterra)</div>

        <!-- Botones de categor�a -->
        <div class="botones">
            <button id="btn-bloc1" onclick="renderizarBloque('bloc1')">Bloc 1 </button>
            <button id="btn-bloc2" onclick="renderizarBloque('bloc2')">Bloc 2 </button>
            <button id="btn-bloc3" onclick="renderizarBloque('bloc3')">Bloc 3 </button>
            <button id="btn-bloc4" onclick="renderizarBloque('bloc4')">Bloc 4 </button>
        </div>

        <!-- Contenedor de videos -->
        <div id="video-list-container"></div>

        <!-- Anuncio final -->
        <div class="adsense-slot">Annonce 2 (Adsterra)</div>
    </div>

    <!-- SCRIPT PARA EL BOT�N DE INSTALAR -->
    <script>
        let deferredPrompt;
        const btnInstalar = document.getElementById('btnInstalar');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            btnInstalar.style.display = 'block';
        });

        btnInstalar.addEventListener('click', (e) => {
            btnInstalar.style.display = 'none';
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                deferredPrompt = null;
            });
        });
    </script>
    <script src="script.js"></script>
</body>
  </html>
